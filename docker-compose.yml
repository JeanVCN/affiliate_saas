services:
  postgres:
    image: postgres:17-alpine
    container_name: affiliate_saas_postgres
    environment:
      POSTGRES_USER: affiliate
      POSTGRES_PASSWORD: affiliate
      POSTGRES_DB: affiliate_saas
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affiliate -d affiliate_saas"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: affiliate_saas_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      - -path
      - /migrations
      - -database
      - postgres://affiliate:affiliate@postgres:5432/affiliate_saas?sslmode=disable
      - up

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: affiliate_saas_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://affiliate:affiliate@postgres:5432/affiliate_saas?sslmode=disable
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
