services:
  postgres:
    image: postgres:17-alpine
    container_name: affiliate_saas_postgres
    environment:
      POSTGRES_USER: affiliate
      POSTGRES_PASSWORD: affiliate
      POSTGRES_DB: affiliate_saas
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affiliate -d affiliate_saas"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
